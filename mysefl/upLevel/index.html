<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài DOM cơ bản #6 - #10</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Bài 6: Thay đổi nội dung -->
  <section id="bai6">
    <h2>#6 Thay đổi nội dung</h2>
    <div class="row">
      <h1 id="title6">Xin chào</h1>
      <button id="btn6">Đổi nội dung</button>
    </div>
  </section>

  <!-- Bài 7: Đếm số lần click -->
  <section id="bai7">
    <h2>#7 Đếm số lần click</h2>
    <div class="row">
      <button id="btn7">Click me</button>
      <span id="count7" class="counter">Số lần: 0</span>
    </div>
  </section>

  <!-- Bài 8: Hiển thị giá trị input -->
  <section id="bai8">
    <h2>#8 Hiển thị giá trị input</h2>
    <div class="row">
      <input id="name8" type="text" placeholder="Nhập tên của bạn..." />
      <button id="btn8">Xác nhận</button>
    </div>
    <p id="result8"></p>
  </section>

  <!-- Bài 9: Thay đổi ảnh -->
  <section id="bai9">
    <h2>#9 Thay đổi ảnh</h2>
    <div class="row">
      <img id="img9" class="demo"
           src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=600&auto=format&fit=crop"
           alt="Ảnh 1" />
      <button id="btn9">Đổi ảnh</button>
    </div>
  </section>

  <!-- Bài 10: Bật/tắt đèn -->
  <section id="bai10">
    <h2>#10 Bật/Tắt đèn</h2>
    <div class="row">
      <img id="bulb10" class="demo"
           src="https://images.unsplash.com/photo-1482192505345-5655af888cc4?q=80&w=600&auto=format&fit=crop"
           alt="Đèn OFF" />
      <button id="btn10">Bật / Tắt</button>
    </div>
  </section>

  <!-- Link tới JS -->
  <script src="main.js"></script>
</body>
</html>
